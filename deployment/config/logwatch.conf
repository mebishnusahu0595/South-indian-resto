# =============================================================================
# Logwatch Configuration for Daily System Digest
# =============================================================================
#
# Installation:
#   sudo apt install logwatch -y
#
# Setup:
#   Copy this to: /usr/share/logwatch/default.conf/logwatch.conf
#   Or create override at: /etc/logwatch/conf/logwatch.conf
#
# Manual Run:
#   sudo logwatch --detail High --mailto your_email@gmail.com --range today
#
# Cron (automatic daily at 6am):
#   Already configured by default in /etc/cron.daily/00logwatch
#
# =============================================================================

# Output method: mail, stdout, or file
Output = mail

# Email recipient for daily digest
MailTo = mebishnusahu0595@gmail.com

# Email sender
MailFrom = logwatch@chettasdosa.dhillon-ventures.com

# Report format: text or html
Format = html

# Detail level: Low, Med, High
Detail = High

# Date range to analyze
Range = yesterday

# Services to include (leave blank for all)
Service = All

# Suppress services with no output
Print = No
