# =============================================================================
# Fail2Ban Configuration for Kea By The Pool VPS
# Copy to: /etc/fail2ban/jail.local
# =============================================================================

[DEFAULT]
# Ban duration (1 hour)
bantime = 1h

# Time window to check for failures
findtime = 10m

# Max failures before ban
maxretry = 5

# Whitelist localhost
ignoreip = 127.0.0.1/8 ::1

# Email notifications (requires msmtp setup)
# destemail = your_email@gmail.com
# sender = vps@yourdomain.com
# action = %(action_mwl)s

# =============================================================================
# SSH Protection (Critical)
# =============================================================================
[sshd]
enabled = true
port = ssh
filter = sshd
logpath = /var/log/auth.log
maxretry = 3
bantime = 24h

# =============================================================================
# Nginx Protection
# =============================================================================
[nginx-http-auth]
enabled = true
filter = nginx-http-auth
port = http,https
logpath = /var/log/nginx/error.log
maxretry = 3
bantime = 1h

[nginx-limit-req]
enabled = true
filter = nginx-limit-req
port = http,https
logpath = /var/log/nginx/error.log
maxretry = 10
bantime = 1h

[nginx-botsearch]
enabled = true
filter = nginx-botsearch
port = http,https
logpath = /var/log/nginx/access.log
maxretry = 2
bantime = 1d

# =============================================================================
# Custom: API Brute Force Protection
# =============================================================================
[nginx-api-abuse]
enabled = true
port = http,https
filter = nginx-api-abuse
logpath = /var/log/nginx/kea-by-the-pool-access.log
maxretry = 50
findtime = 1m
bantime = 1h

# =============================================================================
# MongoDB Protection (if exposed)
# =============================================================================
[mongodb-auth]
enabled = false
port = 27017
filter = mongodb-auth
logpath = /var/log/mongodb/mongod.log
maxretry = 3
bantime = 24h
