# =============================================================================
# Kea By The Pool - Nginx Configuration
# Production-ready with SSL, Caching, Security Headers, and Gzip
# =============================================================================
# 
# Installation:
#   1. Copy this file to /etc/nginx/sites-available/kea-by-the-pool
#   2. sudo ln -s /etc/nginx/sites-available/kea-by-the-pool /etc/nginx/sites-enabled/
#   3. sudo nginx -t
#   4. sudo systemctl restart nginx
#   5. Run Certbot for SSL: sudo certbot --nginx -d yourdomain.com -d www.yourdomain.com
# =============================================================================

# Rate limiting zone (prevent DDoS)
limit_req_zone $binary_remote_addr zone=api_limit:10m rate=10r/s;
limit_req_zone $binary_remote_addr zone=login_limit:10m rate=3r/m;

# Upstream for Node.js backend
upstream kea_backend {
    server 127.0.0.1:5000;
    keepalive 64;
}

# Redirect HTTP to HTTPS
server {
    listen 80;
    listen [::]:80;
    server_name keabythepool.com www.keabythepool.com;
    
    # Allow Certbot challenge
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }
    
    location / {
        return 301 https://$host$request_uri;
    }
}

# Main HTTPS Server
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name keabythepool.com www.keabythepool.com;

    # ==========================================================================
    # SSL Configuration (Certbot will update these paths)
    # ==========================================================================
    ssl_certificate /etc/letsencrypt/live/keabythepool.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/keabythepool.com/privkey.pem;
    ssl_session_timeout 1d;
    ssl_session_cache shared:SSL:50m;
    ssl_session_tickets off;
    
    # Modern SSL configuration
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;
    
    # OCSP Stapling
    ssl_stapling on;
    ssl_stapling_verify on;
    resolver 1.1.1.1 8.8.8.8 valid=300s;
    resolver_timeout 5s;

    # ==========================================================================
    # Security Headers (Hardening)
    # ==========================================================================
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
    
    # HSTS (uncomment after confirming SSL works)
    # add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
    
    # Content Security Policy (adjust as needed)
    # add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline'; img-src 'self' data: https:; font-src 'self' https://fonts.gstatic.com; connect-src 'self' wss: https:;" always;

    # ==========================================================================
    # Gzip Compression
    # ==========================================================================
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_min_length 256;
    gzip_types
         application/atom+xml
         application/javascript
         application/json
         application/ld+json
         application/manifest+json
         application/rss+xml
         application/vnd.geo+json
         application/vnd.ms-fontobject
         application/x-font-ttf
         application/x-web-app-manifest+json
         application/xhtml+xml
         application/xml
         font/opentype
         image/bmp
         image/svg+xml
         image/x-icon
         text/cache-manifest
         text/css
         text/plain
         text/vcard
         text/vnd.rim.location.xloc
         text/vtt
         text/x-component
         text/x-cross-domain-policy
         text/xml;

    # ==========================================================================
    # Root Directory (React Frontend Build)
    # ==========================================================================
    root /root/kea-by-the-pool-website/frontend/dist;
    index index.html;

    # ==========================================================================
    # Static Asset Caching (Browser-side)
    # ==========================================================================
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot|webp|avif)$ {
        expires 30d;
        add_header Cache-Control "public, no-transform, immutable";
        access_log off;
        
        # Security headers for static files too
        add_header X-Content-Type-Options "nosniff" always;
    }

    # ==========================================================================
    # React Frontend (SPA Routing)
    # ==========================================================================
    location / {
        try_files $uri $uri/ /index.html;
        
        # Cache HTML for short time
        add_header Cache-Control "no-cache, must-revalidate";
    }

    # ==========================================================================
    # API Proxy to Node.js Backend
    # ==========================================================================
    location /api {
        # Rate limiting
        limit_req zone=api_limit burst=20 nodelay;
        
        proxy_pass http://kea_backend;
        proxy_http_version 1.1;
        
        # WebSocket support
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        
        # Pass real client info
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # Timeouts
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
        
        proxy_cache_bypass $http_upgrade;
        
        # Buffering
        proxy_buffering on;
        proxy_buffer_size 4k;
        proxy_buffers 8 4k;
    }

    # Stricter rate limiting for auth endpoints
    location /api/auth/login {
        limit_req zone=login_limit burst=5 nodelay;
        
        proxy_pass http://kea_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ==========================================================================
    # Socket.IO (Real-time Orders)
    # ==========================================================================
    location /socket.io {
        proxy_pass http://kea_backend;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # WebSocket timeout (keep connection alive)
        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;
    }

    # ==========================================================================
    # Block Sensitive Files
    # ==========================================================================
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }
    
    location ~ ^/(\.env|package\.json|package-lock\.json|\.git) {
        deny all;
        return 404;
    }

    # ==========================================================================
    # Error Pages
    # ==========================================================================
    error_page 500 502 503 504 /50x.html;
    location = /50x.html {
        root /usr/share/nginx/html;
        internal;
    }

    # ==========================================================================
    # Logging
    # ==========================================================================
    access_log /var/log/nginx/kea-by-the-pool-access.log combined buffer=16k flush=5s;
    error_log /var/log/nginx/kea-by-the-pool-error.log warn;
}
